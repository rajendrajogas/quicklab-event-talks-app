<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Event Schedule</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f4f4;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .search-container {
      text-align: center;
      margin-bottom: 20px;
    }

    #searchInput {
      width: 60%;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ddd;
    }

    .schedule {
      border-collapse: collapse;
      width: 100%;
    }

    .schedule th, .schedule td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }

    .schedule th {
      background-color: #f2f2f2;
    }

    .talk {
      background-color: #e7f3ff;
    }

    .break {
      background-color: #fffbe6;
      font-style: italic;
    }
    .talk-details {
        padding-left: 20px;
    }

    .talk-title {
        font-weight: bold;
    }
    .talk-speakers {
        font-style: italic;
    }
    .talk-category {
        font-size: 0.9em;
        color: #555;
    }
    .talk-description {
        font-size: 0.9em;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Tech Event Schedule</h1>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search by category...">
    </div>
    <table class="schedule">
      <thead>
        <tr>
          <th>Time</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody id="scheduleBody">
        <!-- Schedule will be generated here -->
      </tbody>
    </table>
  </div>

  <script>
    const talks = [
      {
        "title": "The Future of Artificial Intelligence",
        "speakers": ["Dr. Evelyn Reed"],
        "category": ["AI", "Machine Learning"],
        "description": "A deep dive into the latest advancements in AI and what to expect in the coming years."
      },
      {
        "title": "Quantum Computing: A New Paradigm",
        "speakers": ["Prof. Alan Grant", "Dr. Ellie Sattler"],
        "category": ["Quantum", "Computing"],
        "description": "Understanding the principles of quantum computing and its potential to solve complex problems."
      },
      {
        "title": "Building Scalable Web Applications",
        "speakers": ["John Hammond"],
        "category": ["Web Development", "Scalability"],
        "description": "Strategies and best practices for designing and deploying web applications that can handle millions of users."
      },
      {
        "title": "The Ethics of AI in Modern Society",
        "speakers": ["Dr. Ian Malcolm"],
        "category": ["AI", "Ethics"],
        "description": "A critical discussion on the ethical implications of artificial intelligence and autonomous systems."
      },
      {
        "title": "Cybersecurity in the Age of IoT",
        "speakers": ["Dennis Nedry"],
        "category": ["Cybersecurity", "IoT"],
        "description": "Exploring the security challenges posed by the Internet of Things and how to mitigate them."
      },
      {
        "title": "Next-Generation User Interfaces",
        "speakers": ["Ray Arnold", "Robert Muldoon"],
        "category": ["UI", "UX", "Design"],
        "description": "A look at the future of user interface design, including voice and gesture-based interactions."
      }
    ];

    document.addEventListener('DOMContentLoaded', () => {
      const scheduleBody = document.getElementById('scheduleBody');
      const searchInput = document.getElementById('searchInput');

      let scheduleHtml = '';
      let currentTime = new Date('2024-01-01T10:00:00'); 

      const formatTime = (date) => {
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      };

      const addMinutes = (date, minutes) => {
        return new Date(date.getTime() + minutes * 60000);
      };

      const generateSchedule = (talksData) => {
        scheduleHtml = '';
        currentTime = new Date('2024-01-01T10:00:00');
        let talkCounter = 0;

        for (let i = 0; i < 6; i++) {
          if (talkCounter === 3) {
            // Lunch Break
            const breakStartTime = currentTime;
            const breakEndTime = addMinutes(breakStartTime, 60);
            scheduleHtml += `
              <tr class="break">
                <td>${formatTime(breakStartTime)} - ${formatTime(breakEndTime)}</td>
                <td>Lunch Break</td>
              </tr>
            `;
            currentTime = breakEndTime;
          }

          // Talk
          const talkStartTime = currentTime;
          const talkEndTime = addMinutes(talkStartTime, 60);
          const talk = talksData[i];

          scheduleHtml += `
            <tr class="talk" data-category="${talk.category.join(',').toLowerCase()}">
              <td>${formatTime(talkStartTime)} - ${formatTime(talkEndTime)}</td>
              <td>
                <div class="talk-details">
                    <div class="talk-title">${talk.title}</div>
                    <div class="talk-speakers">By: ${talk.speakers.join(', ')}</div>
                    <div class="talk-category">Categories: ${talk.category.join(', ')}</div>
                    <div class="talk-description">${talk.description}</div>
                </div>
              </td>
            </tr>
          `;
          currentTime = talkEndTime;

          // Transition
          if (i < 5 && (talkCounter + 1) % 3 !== 0) {
            const transitionStartTime = currentTime;
            const transitionEndTime = addMinutes(transitionStartTime, 10);
            scheduleHtml += `
              <tr class="break">
                <td>${formatTime(transitionStartTime)} - ${formatTime(transitionEndTime)}</td>
                <td>Transition</td>
              </tr>
            `;
            currentTime = transitionEndTime;
          }
          talkCounter++;
        }
        scheduleBody.innerHTML = scheduleHtml;
      };

      const filterTalks = () => {
        const searchTerm = searchInput.value.toLowerCase();
        const talks = document.querySelectorAll('.talk');
        talks.forEach(talk => {
          const categories = talk.dataset.category;
          if (categories.includes(searchTerm)) {
            talk.style.display = '';
          } else {
            talk.style.display = 'none';
          }
        });
      };

      generateSchedule(talks);
      searchInput.addEventListener('keyup', filterTalks);
    });
  </script>

</body>
</html>
